<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lark OS 27</title>
    <link rel="icon" href="./assets/icons/icon.svg">
    <link rel="manifest" href="./manifest.json">
    <link rel="stylesheet" href="./src/ui/theme.css">
    <!-- version 2 omni -->
    <link rel="stylesheet" href="./src/ui/omni.css">
    <style>
        #desktop-host, #platform-host {
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
        }
        #platform-host {
            pointer-events: none;
            z-index: 9000;
        }
        #platform-host > * {
            pointer-events: auto;
        }
    </style>
</head>
<body>
    <div id="desktop-host">
        <div id="window-host" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none;"></div>
    </div>
    <div id="platform-host"></div>
    <script>
        // Resolve the base URL dynamically to support subdirectory deployments (e.g., GitHub Pages)
        window.LDE_BASE_URL = new URL('.', window.location.href).href;
    </script>
    <script type="module">
        import { ServiceWorkerManager } from './src/kernel/ServiceWorkerManager.js';
        ServiceWorkerManager.init();
    </script>
    <script type="module" src="./src/kernel/BootLoader.js"></script>
</body>
</html>
